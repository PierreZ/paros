name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo clippy
        run: nix develop --command cargo clippy -- --deny warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo fmt
        run: nix develop --command cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo nextest
        run: nix develop --command cargo nextest run

  # The sans-IO core + the sim's workloads/oracles must stay portable to wasm32
  # so the browser demo runs them unchanged. paros-core is zero-dep/std-only;
  # paros-sim must build in its wasm-able `--no-default-features` configuration;
  # paros-wasm-demo must compile the whole stack to wasm32.
  portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build paros-core for wasm32-unknown-unknown
        run: nix develop --command cargo check --target wasm32-unknown-unknown -p paros-core
      - name: Lint paros-sim in its wasm-able configuration
        run: nix develop --command cargo clippy -p paros-sim --no-default-features --all-targets -- --deny warnings
      - name: Build paros-wasm-demo for wasm32-unknown-unknown
        run: nix develop --command cargo check --target wasm32-unknown-unknown -p paros-wasm-demo
